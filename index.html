<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HighClass.2hand - High Point</title>
  <style>
    body { font-family: 'Helvetica', 'Arial', sans-serif; background-color: #FAFAFA; margin: 0; color: #333; }
    .navbar { background-color: #111; color: white; padding: 15px 20px; text-align: center; font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; }
    .container { max-width: 500px; margin: 40px auto; padding: 20px; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
    
    input[type="text"] { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; text-align: center; box-sizing: border-box;}
    button { background-color: #111; color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; transition: 0.3s; }
    button:hover { background-color: #333; }
    button:disabled { background-color: #888; cursor: not-allowed; }
    
    #dashboardSection { display: none; }
    .profile-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 3px solid #111; }
    .rank-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; color: white; font-weight: bold; font-size: 0.9rem; margin: 10px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
    .points-display { font-size: 3rem; font-weight: bold; margin: 10px 0; color: #111; }
    
    .reward-box { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-top: 20px; text-align: left; display: flex; align-items: center; justify-content: space-between; }
    .reward-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; margin-right: 15px; background: #eee; }
    .btn-redeem { width: auto; padding: 8px 15px; font-size: 14px; background: #111; }
    
    .loader { display: none; margin-top: 10px; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>

  <div class="navbar">HighClass.2hand</div>

  <div class="container">
    <div id="loginSection" class="card">
      <h2>เข้าสู่ระบบ High Point</h2>
      <p style="color: #666; font-size: 0.9rem;">กรุณากรอกเบอร์โทรศัพท์เพื่อตรวจสอบพอยต์สะสม</p>
      <input type="text" id="phoneInput" placeholder="เช่น 0812345678">
      <button id="loginBtn" onclick="login()">เข้าสู่ระบบ</button>
      <div id="loginLoader" class="loader">กำลังตรวจสอบข้อมูล...</div>
      <p id="loginError" style="color: red; display: none; margin-top: 10px; font-size: 0.9rem;"></p>
    </div>

    <div id="dashboardSection" class="card">
      <img id="userPic" class="profile-pic" src="" alt="Profile">
      <h2 id="userName" style="margin: 5px 0;">ชื่อลูกค้า</h2>
      <div id="userRank" class="rank-badge">แรงค์</div>
      
      <div style="background: #f4f4f4; border-radius: 12px; padding: 20px; margin: 20px 0;">
        <p style="margin: 0; color: #666;">High Point คงเหลือ</p>
        <div id="userPoints" class="points-display">0</div>
      </div>

      <h3 style="text-align: left; margin-bottom: 10px;">แลกของรางวัล</h3>
      <div class="reward-box">
        <div style="display: flex; align-items: center;">
          <img src="https://images.unsplash.com/photo-1576566588028-4147f3842f27?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" class="reward-img" alt="Stussy">
          <div>
            <strong>Stussy T-shirt</strong><br>
            <span style="color: #666; font-size: 0.9rem;">10 High Point</span>
          </div>
        </div>
        <button id="redeemBtn" class="btn-redeem" onclick="redeem('Stussy T-shirt', 10)">แลกเลย</button>
      </div>
      
      <button onclick="logout()" style="background: #ccc; color: #333; margin-top: 30px;">ออกจากระบบ</button>
    </div>
  </div>

  <script>
    // ⚠️ เอา URL ของ Web App จาก Google Apps Script มาใส่ตรงนี้ ⚠️
    const API_URL = 'https://script.google.com/macros/s/AKfycbzDkwFbsS2wpufDmzs9GcrV5wse61LWUDkgn5dzxd2wcrkSUBb81wmDDAMMuwjh5LI8/exec'; 
    
    let currentUserPhone = '';

    async function login() {
      const phone = document.getElementById('phoneInput').value.trim();
      if(!phone) return;

      const btn = document.getElementById('loginBtn');
      const loader = document.getElementById('loginLoader');
      const errorText = document.getElementById('loginError');
      
      btn.disabled = true;
      loader.style.display = 'block';
      errorText.style.display = 'none';
      
      try {
        // ยิง Fetch API ไปที่ Google Sheets
        const response = await fetch(`${API_URL}?action=login&phone=${phone}`);
        const data = await response.json();
        
        if (data.success) {
          currentUserPhone = data.phone;
          document.getElementById('loginSection').style.display = 'none';
          document.getElementById('dashboardSection').style.display = 'block';
          
          document.getElementById('userName').innerText = data.name;
          document.getElementById('userPoints').innerText = data.currentPoints;
          document.getElementById('userPic').src = data.profilePic;
          
          const rankElement = document.getElementById('userRank');
          rankElement.innerText = data.rank.name;
          rankElement.style.backgroundColor = data.rank.color;
        } else {
          errorText.innerText = data.message;
          errorText.style.display = 'block';
        }
      } catch (error) {
        errorText.innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์';
        errorText.style.display = 'block';
      } finally {
        btn.disabled = false;
        loader.style.display = 'none';
      }
    }

    async function redeem(itemName, cost) {
      if(confirm(`ยืนยันการใช้ ${cost} พอยต์ เพื่อแลก ${itemName} ใช่หรือไม่?`)) {
        const btn = document.getElementById('redeemBtn');
        btn.innerText = 'กำลังประมวลผล...';
        btn.disabled = true;

        try {
          const response = await fetch(`${API_URL}?action=redeem&phone=${currentUserPhone}&item=${encodeURIComponent(itemName)}&cost=${cost}`);
          const data = await response.json();
          
          if(data.success) {
            alert('แลกของรางวัลสำเร็จ! โปรดแคปหน้าจอนี้แจ้งแอดมินทางแชทครับ');
            login(); // โหลดข้อมูลพอยต์ใหม่
          } else {
            alert(data.message);
          }
        } catch (error) {
          alert('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
        } finally {
          btn.innerText = 'แลกเลย';
          btn.disabled = false;
        }
      }
    }

    function logout() {
      currentUserPhone = '';
      document.getElementById('phoneInput').value = '';
      document.getElementById('dashboardSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
    }
  </script>
</body>
</html>
